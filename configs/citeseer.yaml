# python main.py --config configs/citeseer.yaml

model:
  name: GCN
  hidden_dim: 16
  dropout: 0.5

training:
  lr: 0.01
  weight_decay: 0.0005
  epochs: 200
  patience: 100
  scheduler: true
  tensorboard: true

experiment:
  save_best: true
  save_last: true
  log_interval: 1

data:
  name: CiteSeer
  root: data

seed: 42
device: cuda
